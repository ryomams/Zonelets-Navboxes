<!--
//XXXXXXXXXXXXXXXXXXXXXXXXXXXXX
// STEP 1. archive.html
// Paste the table HTML on your archive.html toward the bottom
// of your body tag, just above your footer, and set the table's
// ID.		

	You can set one navbox per page to have an ID of "all", "posts", or "tags":
		- If you set the navbox's <table>'s ID to "tags", it will generate a table of
			all in-use tags.
		- If you set the navbox's <table>'s ID to "posts", it will generate the standard
			navbox table that appears except it will have a row for every active post.
		- If you set the navbox's <table>'s ID to "all", it will generate a table with
			the "tags"-style navbox above the "posts".

-->

<!--
//XXXXXXXXXXXXXXXXXXXXXXXXXXXXX
// STEP 2. ./posts/XX-XX-XX-Post-Template.html
// Paste the header HTML underneath your <h4 id="postDate">...</h4>.
// You can put it anywhere you think looks good.
// Then, paste the table HTML in your post template, toward the bottom
// of your body tag, just above your <div id="nextprev"> or wherever
// your footer starts.
// Set the table ID to "related", so the navbox can show related
// posts corresponding to the tag of the post. 

	You can set one navbox per page to have an ID of "all", "posts", or "tags":
		- If you set the navbox's <table>'s ID to "tags", it will generate a table of
			all in-use tags.
		- If you set the navbox's <table>'s ID to "posts", it will generate the standard
			navbox table that appears except it will have a row for every active post.
		- If you set the navbox's <table>'s ID to "all", it will generate a table with
			the "tags"-style navbox above the "posts".

-->
